name: Earnings Surprise Notification

on:
  schedule:
    # 07:00 JST = 22:00 UTC
    # 遅延対策で 21:52 UTC 開始
    - cron: '52 21 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'テストモード (過去7日分をスキャンして直近結果を取得)'
        type: boolean
        default: false

concurrency:
  group: earnings-surprise
  cancel-in-progress: false

jobs:
  send-surprise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run earnings surprise
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_EARNINGS }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_EARNINGS }}
          TEST_MODE: ${{ github.event.inputs.test_mode == 'true' && '1' || '0' }}
        run: |
          python scripts/earnings_surprise/main.py

      - name: Commit log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/earnings_surprise_log.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update earnings surprise log"
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "No changes in earnings_surprise_log.json"
          fi
